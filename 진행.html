<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>프로젝트 진행 상황</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .progress-container { width: 100%; background-color: #f3f3f3; border-radius: 5px; margin-bottom: 20px; }
        .progress-bar { width: 0%; height: 30px; background-color: #4CAF50; text-align: center; line-height: 30px; color: white; border-radius: 5px; }
        ul { list-style-type: none; padding: 0; }
        li { padding: 10px; border-bottom: 1px solid #ddd; }
        .done { text-decoration: line-through; color: gray; }
        .current { font-weight: bold; color: blue; }
    </style>
</head>
<body>
    <h1>프로젝트 진행 상황</h1>
    <div class="progress-container">
        <div class="progress-bar" style="width: 0%;">0%</div>
    </div>
    <ul>
        <li>1. 환경 설정 및 데이터베이스 스키마 생성</li>
        <li>2. 회원가입 및 로그인 기능 (자동 로그인 포함)</li>
        <li>3. 게시글 CRUD 기능 (목록, 작성, 수정, 삭제)</li>
        <li>4. 댓글 CRUD 기능 및 추천 시스템</li>
        <li>5. 프론트엔드 디자인 적용 및 최종 검수</li>
    </ul>
</body>
</html>
